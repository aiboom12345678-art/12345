<index.html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ลงเวลาเข้า-ออก | ระบบฝึกงาน</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --green: #3B6D11;
    --green-light: #EAF3DE;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --border: #e2e2e2;
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --hint: #b0b5bd;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Sarabun', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .header { text-align: center; margin-bottom: 1.75rem; }
  .logo { width: 56px; height: 56px; border-radius: 16px; background: var(--blue); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
  .logo svg { width: 28px; height: 28px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .header h1 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .header .date { font-size: 13px; color: var(--muted); }
  .card { background: var(--card); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .field { margin-bottom: 1rem; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 13px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; letter-spacing: 0.02em; }
  label .req { color: #E24B4A; }
  input[type=text], input[type=password] {
    width: 100%; padding: 11px 14px; font-size: 16px; border-radius: 10px;
    border: 1.5px solid var(--border); background: #fafafa; color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    font-family: inherit;
  }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(55,138,221,0.12); background: #fff; }
  .sig-wrap { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; background: #fff; position: relative; }
  canvas { display: block; width: 100%; height: 170px; cursor: crosshair; touch-action: none; }
  .sig-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-top: 1px solid var(--border); background: #fafafa; }
  .sig-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 14px; color: var(--hint); pointer-events: none; transition: opacity 0.2s; display: flex; align-items: center; gap: 6px; }
  .btn-clear { font-size: 12px; color: var(--muted); background: #fff; border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-family: inherit; }
  .btn-clear:hover { background: var(--bg); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
  .btn-in, .btn-out {
    padding: 13px; font-size: 15px; font-weight: 600; border-radius: 12px;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 7px; transition: all 0.15s; font-family: inherit;
  }
  .btn-in { background: var(--blue); color: #fff; }
  .btn-in:hover { background: #0C447C; }
  .btn-out { background: var(--green); color: #fff; }
  .btn-out:hover { background: #27500A; }
  .btn-in:disabled, .btn-out:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }
  .status { border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-top: 10px; display: none; font-weight: 500; }
  .status.ok { background: var(--green-light); color: #27500A; border: 1px solid #97C459; }
  .status.err { background: var(--red-light); color: #791F1F; border: 1px solid #F09595; }
  .status.load { background: var(--blue-light); color: #0C447C; border: 1px solid #85B7EB; }
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
  .admin-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; font-size: 14px; font-weight: 600; color: var(--muted); background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .admin-btn:hover { border-color: var(--blue-mid); color: var(--blue); background: var(--blue-light); }
  .admin-area { margin-top: 1rem; display: none; }
  .admin-login-row { display: flex; gap: 8px; }
  .admin-login-row input { flex: 1; }
  .btn-login { padding: 11px 18px; font-size: 14px; font-weight: 600; border-radius: 10px; border: none; background: var(--blue); color: #fff; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-login:hover { background: #0C447C; }
  .btn-login:disabled { background: #d1d5db; cursor: not-allowed; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .panel-header h3 { font-size: 15px; font-weight: 700; }
  .badge { font-size: 11px; background: var(--blue-light); color: var(--blue); border-radius: 20px; padding: 3px 10px; font-weight: 600; margin-left: 6px; }
  .btn-export { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--blue); background: var(--blue-light); border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-family: inherit; }
  .btn-export:hover { background: #B5D4F4; }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }
  .rec { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rec:last-child { border-bottom: none; }
  .av { width: 36px; height: 36px; min-width: 36px; border-radius: 50%; background: var(--blue-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--blue); }
  .rec-info { flex: 1; min-width: 0; }
  .rec-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rec-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .rec-sig { height: 30px; border-radius: 4px; border: 1px solid var(--border); max-width: 72px; background: #fff; }
  .empty { text-align: center; padding: 2rem 1rem; color: var(--hint); font-size: 14px; }
  .tag-in { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; background: var(--blue-light); color: var(--blue); margin-left: 5px; }
  .tag-out { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; background: var(--green-light); color: var(--green); margin-left: 5px; }
  .tag-miss { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; background: #FEF9C3; color: #854F0B; margin-left: 5px; }
  .btn-danger { font-size: 12px; color: var(--red); background: none; border: 1px solid #F09595; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
  .btn-danger:hover { background: var(--red-light); }
  .refresh-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .btn-refresh { font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
  .btn-refresh:hover { background: var(--bg); }
  @media (max-width: 400px) {
    .btn-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <h1>ลงเวลาเข้า-ออกงาน</h1>
    <div class="date" id="dateDisplay"></div>
  </div>

  <div class="card">
    <div class="field">
      <label>ชื่อ–นามสกุล <span class="req">*</span></label>
      <input type="text" id="nameInput" placeholder="เช่น สมชาย ใจดี" autocomplete="name" />
    </div>
    <div class="field">
      <label>ลายเซ็น <span class="req">*</span></label>
      <div class="sig-wrap">
        <canvas id="sigCanvas"></canvas>
        <div class="sig-hint" id="sigHint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          เซ็นชื่อที่นี่
        </div>
        <div class="sig-bar">
          <span style="font-size:11px;color:var(--hint)">วาดลายเซ็นด้วยนิ้วหรือเมาส์</span>
          <button class="btn-clear" id="clearSig">ล้าง</button>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-in" id="btnIn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        ลงเวลามา
      </button>
      <button class="btn-out" id="btnOut">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        ลงเวลากลับ
      </button>
    </div>
    <div class="status" id="statusBox"></div>
  </div>

  <div class="divider"></div>

  <button class="admin-btn" id="adminToggle">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    หน้าแอดมิน
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="chevIcon"><polyline points="6 9 12 15 18 9"/></svg>
  </button>

  <div class="admin-area" id="adminArea">
    <div class="card">
      <div id="loginSection">
        <label style="margin-bottom:8px">รหัสผ่านแอดมิน</label>
        <div class="admin-login-row">
          <input type="password" id="adminPass" placeholder="ใส่รหัสผ่าน" />
          <button class="btn-login" id="btnLogin">เข้าสู่ระบบ</button>
        </div>
        <div class="status" id="loginStatus"></div>
      </div>
      <div id="adminPanel" style="display:none">
        <div class="panel-header">
          <div>
            <span style="font-size:15px;font-weight:700">รายการทั้งหมด</span>
            <span class="badge" id="recCount">0 รายการ</span>
          </div>
          <button class="btn-export" id="btnExport" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            Export Excel
          </button>
        </div>
        <div id="recList"></div>
        <div class="refresh-row">
          <button class="btn-refresh" id="btnRefresh">&#x21bb; รีเฟรช</button>
          <button class="btn-danger" id="btnClear">ล้างข้อมูลทั้งหมด</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyvssErvyCOZBqUBvHNStMJ4f_5y13alsjRt_rOLhGKjiFn02CJR8IqE9IgOLnyqYwt/exec';

const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('sigHint');
const nameInput = document.getElementById('nameInput');
const statusBox = document.getElementById('statusBox');

let drawing = false, hasSig = false, adminPwd = '';

function initCanvas() {
  const r = window.devicePixelRatio || 1;
  const w = canvas.parentElement.getBoundingClientRect().width;
  canvas.width = w * r;
  canvas.height = 170 * r;
  ctx.scale(r, r);
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return { x: s.clientX - rect.left, y: s.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  hint.style.opacity = '0'; hasSig = true;
});
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y); ctx.stroke();
});
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); drawing = true;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  hint.style.opacity = '0'; hasSig = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y); ctx.stroke();
}, { passive: false });
canvas.addEventListener('touchend', () => drawing = false);

document.getElementById('clearSig').addEventListener('click', () => {
  const r = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / r, canvas.height / r);
  hint.style.opacity = '1'; hasSig = false;
});

function showStatus(el, msg, type) {
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
  if (type === 'ok') setTimeout(() => el.style.display = 'none', 3000);
}

function clearForm() {
  nameInput.value = '';
  const r = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / r, canvas.height / r);
  hint.style.opacity = '1'; hasSig = false;
}

async function postAPI(payload) {
  const res = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  return await res.json();
}

async function handleAttendance(action) {
  const name = nameInput.value.trim();
  if (!name) { showStatus(statusBox, 'กรุณากรอกชื่อก่อน', 'err'); nameInput.focus(); return; }
  if (!hasSig) { showStatus(statusBox, 'กรุณาเซ็นชื่อก่อน', 'err'); return; }
  const sig = canvas.toDataURL('image/png');
  showStatus(statusBox, 'กำลังบันทึก...', 'load');
  document.getElementById('btnIn').disabled = true;
  document.getElementById('btnOut').disabled = true;
  try {
    const data = await postAPI({ action, name, sig });
    if (data.success) {
      showStatus(statusBox, (action === 'checkin' ? '✓ บันทึกเวลามา ' : '✓ บันทึกเวลากลับ ') + data.time + ' สำเร็จ!', 'ok');
      clearForm();
    } else {
      showStatus(statusBox, data.message || 'เกิดข้อผิดพลาด', 'err');
    }
  } catch (e) {
    showStatus(statusBox, 'ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่', 'err');
  }
  document.getElementById('btnIn').disabled = false;
  document.getElementById('btnOut').disabled = false;
}

document.getElementById('btnIn').addEventListener('click', () => handleAttendance('checkin'));
document.getElementById('btnOut').addEventListener('click', () => handleAttendance('checkout'));

let adminOpen = false;
document.getElementById('adminToggle').addEventListener('click', () => {
  adminOpen = !adminOpen;
  document.getElementById('adminArea').style.display = adminOpen ? 'block' : 'none';
  document.getElementById('chevIcon').style.transform = adminOpen ? 'rotate(180deg)' : '';
});

document.getElementById('btnLogin').addEventListener('click', async () => {
  const pw = document.getElementById('adminPass').value;
  if (!pw) return;
  adminPwd = pw;
  const btn = document.getElementById('btnLogin');
  btn.textContent = 'กำลังโหลด...'; btn.disabled = true;
  const loginStatus = document.getElementById('loginStatus');
  try {
    const data = await postAPI({ action: 'getRecords', password: pw });
    if (data.success) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      renderRecords(data.records);
    } else {
      showStatus(loginStatus, data.message || 'รหัสผ่านไม่ถูกต้อง', 'err');
    }
  } catch (e) {
    showStatus(loginStatus, 'ไม่สามารถเชื่อมต่อได้', 'err');
  }
  btn.textContent = 'เข้าสู่ระบบ'; btn.disabled = false;
});

document.getElementById('adminPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnLogin').click();
});

function initials(name) {
  const p = name.trim().split(' ');
  return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : name.slice(0, 2).toUpperCase();
}

let currentRecords = [];

function renderRecords(records) {
  currentRecords = records;
  document.getElementById('recCount').textContent = records.length + ' รายการ';
  document.getElementById('btnExport').disabled = records.length === 0;
  const list = document.getElementById('recList');
  if (records.length === 0) {
    list.innerHTML = '<div class="empty">ยังไม่มีข้อมูล</div>';
    return;
  }
  list.innerHTML = records.slice().reverse().map(r => `
    <div class="rec">
      <div class="av">${initials(r.name)}</div>
      <div class="rec-info">
        <div class="rec-name">${r.name}</div>
        <div class="rec-time">
          ${r.date}
          <span class="tag-in">มา ${r.checkin || '-'}</span>
          <span class="${r.checkout ? 'tag-out' : 'tag-miss'}">กลับ ${r.checkout || 'ยังไม่ได้ลง'}</span>
        </div>
      </div>
      ${r.sig ? `<img class="rec-sig" src="${r.sig}" alt="ลายเซ็น" />` : ''}
    </div>
  `).join('');
}

document.getElementById('btnRefresh').addEventListener('click', async () => {
  const btn = document.getElementById('btnRefresh');
  btn.textContent = 'กำลังโหลด...'; btn.disabled = true;
  try {
    const data = await postAPI({ action: 'getRecords', password: adminPwd });
    if (data.success) renderRecords(data.records);
  } catch (e) {}
  btn.textContent = '↻ รีเฟรช'; btn.disabled = false;
});

document.getElementById('btnClear').addEventListener('click', async () => {
  if (!confirm('ยืนยันลบข้อมูลทั้งหมดใน Google Sheets?')) return;
  try {
    const data = await postAPI({ action: 'clearRecords', password: adminPwd });
    if (data.success) renderRecords([]);
    else alert(data.message);
  } catch (e) { alert('เกิดข้อผิดพลาด'); }
});

document.getElementById('btnExport').addEventListener('click', () => {
  if (!currentRecords.length) return;
  const wb = XLSX.utils.book_new();

  // Sheet 1: สรุปเวลา
  const ws1 = XLSX.utils.aoa_to_sheet([['ลำดับ', 'ชื่อ–นามสกุล', 'วันที่', 'เวลามา', 'เวลากลับ']]);
  currentRecords.forEach((r, i) => {
    XLSX.utils.sheet_add_aoa(ws1, [[i + 1, r.name, r.date, r.checkin || '', r.checkout || '']], { origin: -1 });
  });
  ws1['!cols'] = [{ wch: 6 }, { wch: 24 }, { wch: 14 }, { wch: 10 }, { wch: 10 }];
  XLSX.utils.book_append_sheet(wb, ws1, 'สรุปเวลา');

  // Sheet 2: ลายเซ็น (Base64 URL)
  const ws2 = XLSX.utils.aoa_to_sheet([['ลำดับ', 'ชื่อ–นามสกุล', 'วันที่', 'เวลามา', 'เวลากลับ', 'ลายเซ็น (Base64)']]);
  currentRecords.forEach((r, i) => {
    XLSX.utils.sheet_add_aoa(ws2, [[i + 1, r.name, r.date, r.checkin || '', r.checkout || '', r.sig || '']], { origin: -1 });
  });
  ws2['!cols'] = [{ wch: 6 }, { wch: 24 }, { wch: 14 }, { wch: 10 }, { wch: 10 }, { wch: 80 }];
  XLSX.utils.book_append_sheet(wb, ws2, 'ลายเซ็น');

  const d = new Date().toLocaleDateString('th-TH').replace(/\//g, '-');
  XLSX.writeFile(wb, 'ลงเวลาฝึกงาน_' + d + '.xlsx');
});

// Date display
const now = new Date();
document.getElementById('dateDisplay').textContent = now.toLocaleDateString('th-TH', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

window.addEventListener('resize', initCanvas);
initCanvas();
</script>
</body>
</html>
